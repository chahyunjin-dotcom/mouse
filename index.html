            {id:0,col:0,row:0,cw:1,ch:1},{id:1,col:1,row:0,cw:1,ch:1},
            {id:2,col:2,row:0,cw:1,ch:1},{id:3,col:3,row:0,cw:1,ch:1},
            {id:4,col:0,row:1,cw:1,ch:1},{id:5,col:1,row:1,cw:1,ch:1},
            {id:6,col:2,row:1,cw:1,ch:1},{id:7,col:3,row:1,cw:1,ch:1},
            {id:8,col:0,row:2,cw:2,ch:1},{id:9,col:2,row:2,cw:2,ch:1},
        ];

        // ── 곡선 탭 그리기 헬퍼 ──────────────────────────────────────────
        // dir: +1(이 조각 쪽으로 볼록), -1(이 조각 쪽으로 오목)
        // 수평 이동 (x0→x1, y 고정): 상단/하단 경계
        function tabH(ctx, x0, y, x1, dir) {
            const len = x1 - x0;            // 양수=오른쪽, 음수=왼쪽
            const absl = Math.abs(len);
            const sign = len > 0 ? 1 : -1;  // 이동 방향
            const mx   = (x0 + x1) / 2;
            const ts   = absl * 0.28;        // 탭 폭 반
            const td   = dir * absl * 0.2;  // 탭 깊이 (y 방향)
            const t0 = mx - ts * sign;
            const t1 = mx + ts * sign;
            ctx.lineTo(t0, y);
            ctx.bezierCurveTo(t0, y + td * 0.6,  mx - ts * 0.1 * sign, y + td, mx, y + td);
            ctx.bezierCurveTo(mx + ts * 0.1 * sign, y + td, t1, y + td * 0.6, t1, y);
            ctx.lineTo(x1, y);
        }

        // 수직 이동 (y0→y1, x 고정): 우측/좌측 경계
        function tabV(ctx, x, y0, y1, dir) {
            const len  = y1 - y0;
            const absl = Math.abs(len);
            const sign = len > 0 ? 1 : -1;
            const my   = (y0 + y1) / 2;
            const ts   = absl * 0.28;
            const td   = dir * absl * 0.2;
            const t0 = my - ts * sign;
            const t1 = my + ts * sign;
            ctx.lineTo(x, t0);
            ctx.bezierCurveTo(x + td * 0.6, t0,  x + td, my - ts * 0.1 * sign, x + td, my);
            ctx.bezierCurveTo(x + td, my + ts * 0.1 * sign, x + td * 0.6, t1, x, t1);
            ctx.lineTo(x, y1);
        }

        // 조각 path — PAD 포함 캔버스 좌표계에서 그림
        // slotMode=true 면 슬롯용(보드 위 가이드) → 이미지 없이 외곽선만 표시
        // 경계 규칙:
        //   상단: row>0 → hEdge[row-1][col]  +1이면 위로 볼록(이웃이 오목)
        //   하단: bRow<ROWS-1 → hEdge[bRow][col]  +1이면 아래로 볼록
        //   우측: rCol<COLS-1 → vEdge[row][rCol]  +1이면 오른쪽으로 볼록
        //   좌측: col>0 → vEdge[row][col-1]  +1이면 왼쪽으로 볼록
        // 슬롯은 조각과 동일한 path를 사용해야 완전히 일치함
        function drawPuzzlePiecePath(ctx, d, cw, ch) {
            const ox = PUZZLE_PAD, oy = PUZZLE_PAD;
            const pw = d.cw * cw, ph = d.ch * ch;
            const x0 = ox, y0 = oy, x1 = ox + pw, y1 = oy + ph;
            const { col, row } = d;
            const sc = d.cw, sr = d.ch; // span
            const rCol = col + sc - 1;
            const bRow = row + sr - 1;

            ctx.beginPath();
            ctx.moveTo(x0, y0);

            // ── 상단 (x0→x1, y0 고정) ──
            if (row === 0) {
                ctx.lineTo(x1, y0);
            } else {
                // hEdge[row-1][col]: +1이면 위(y감소)쪽으로 볼록 → dir=-1 (y감소 방향)
                tabH(ctx, x0, y0, x1, -P_hEdge[row-1][col]);
            }

            // ── 우측 (y0→y1, x1 고정) ──
            if (rCol === P_COLS - 1) {
                ctx.lineTo(x1, y1);
            } else {
                // vEdge[row][rCol]: +1이면 오른쪽(x증가)으로 볼록 → dir=+1
                tabV(ctx, x1, y0, y1, P_vEdge[row][rCol]);
            }

            // ── 하단 (x1→x0, y1 고정, 역방향) ──
            if (bRow === P_ROWS - 1) {
                ctx.lineTo(x0, y1);
            } else {
                // hEdge[bRow][col]: +1이면 아래(y증가)로 볼록 → 역방향이므로 dir=+1
                tabH(ctx, x1, y1, x0, P_hEdge[bRow][col]);
            }

            // ── 좌측 (y1→y0, x0 고정, 역방향) ──
            if (col === 0) {
                ctx.lineTo(x0, y0);
            } else {
                // vEdge[row][col-1]: +1이면 오른쪽 볼록 → 이 조각 좌측엔 오목 → dir=-1, 역방향
                tabV(ctx, x0, y1, y0, -P_vEdge[row][col-1]);
            }

            ctx.closePath();
        }

        function buildPieceDefs(bw, bh) {
            const cw = bw / P_COLS, ch = bh / P_ROWS;
            return P_LAYOUT.map(d => ({
                ...d,
                px: d.col * cw, py: d.row * ch,
                pw: d.cw  * cw, ph: d.ch  * ch,
                _cw: cw, _ch: ch,
            }));
        }

        function startPuzzleGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('puzzle-screen').classList.add('active');

            initEdges(); // 경계 방향 새로 랜덤 생성
            puzzlePlacedCount = 0;
            puzzleSeconds     = 0;
            puzzlePieces      = [];
            puzzleDragging    = null;
            document.getElementById('puzzle-info').textContent  = '🧩 0 / 10 완성';
            document.getElementById('puzzle-timer').textContent = '⏰ 0초';

            clearInterval(puzzleTimerInterval);
            puzzleTimerInterval = setInterval(() => {
                puzzleSeconds++;
                document.getElementById('puzzle-timer').textContent = '⏰ ' + puzzleSeconds + '초';
            }, 1000);

            // 이미지: 업로드 이미지 > 선택된 이미지 > 첫 번째 이미지 > Canvas 폴백
            const src = uploadedImageURL || puzzleSelectedSrc || PUZZLE_IMAGES[0].src;
            const nameLabel = document.getElementById('puzzle-img-name');
            if (nameLabel) nameLabel.textContent = puzzleSelectedName || PUZZLE_IMAGES[0].name;
            puzzleImg = new Image();
            puzzleImg.onload = () => initPuzzleBoard();
            puzzleImg.onerror = () => {
                puzzleImg = makePuzzleFallback();
                setTimeout(() => initPuzzleBoard(), 30);
            };
            puzzleImg.src = src;
        }

        function makePuzzleFallback() {
            const W = 512, H = 512, c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const bg = ctx.createRadialGradient(W/2,H*0.4,20,W/2,H/2,H*0.7);
            bg.addColorStop(0,'#2dd4bf'); bg.addColorStop(0.5,'#0891b2'); bg.addColorStop(1,'#134e4a');
            ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
            ctx.font='180px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('🧚',W/2,H*0.42);
            ctx.font='bold 40px sans-serif'; ctx.fillStyle='#FFD700';
            ctx.fillText('퍼즐을 맞춰봐요 🧩',W/2,H*0.83);
            const img = new Image(); img.src = c.toDataURL('image/png'); return img;
        }

        function initPuzzleBoard() {
            const board = document.getElementById('puzzle-board');
            const tray  = document.getElementById('puzzle-tray');

            while (tray.children.length > 1) tray.removeChild(tray.lastChild);
            board.innerHTML = '';

            // 보드 크기 계산
            const bodyEl = document.querySelector('.puzzle-body');
            const availH = bodyEl.clientHeight - 50;
            const availW = bodyEl.clientWidth  - 250;
            const ratio  = puzzleImg.naturalWidth / puzzleImg.naturalHeight;
            let bh = Math.min(availH, 460);
            let bw = Math.round(bh * ratio);
            if (bw > availW) { bw = availW; bh = Math.round(bw / ratio); }
            BOARD_W = bw; BOARD_H = bh;
            board.style.width  = bw + 'px';
            board.style.height = bh + 'px';

            const defs = buildPieceDefs(bw, bh);
            puzzleTotalPieces = defs.length;
            document.getElementById('puzzle-info').textContent = '🧩 0 / ' + puzzleTotalPieces + ' 완성';

            const scaleX = puzzleImg.naturalWidth  / bw;
            const scaleY = puzzleImg.naturalHeight / bh;

            defs.forEach(d => {
                const canW = d.pw + PUZZLE_PAD * 2;
                const canH = d.ph + PUZZLE_PAD * 2;

                // ── 슬롯 가이드 캔버스 ──────────────────────────────────
                // 조각과 완전히 동일한 path로 그려야 위치가 일치함
                const slotCanvas = document.createElement('canvas');
                slotCanvas.width  = canW; slotCanvas.height = canH;
                slotCanvas.style.cssText =
                    `position:absolute;left:${d.px - PUZZLE_PAD}px;top:${d.py - PUZZLE_PAD}px;` +
                    `width:${canW}px;height:${canH}px;pointer-events:none;z-index:1;`;
                slotCanvas.dataset.pieceId = d.id;
                slotCanvas.className = 'puzzle-slot';
                const sc = slotCanvas.getContext('2d');
                // 반투명 채우기로 슬롯 위치 표시
                drawPuzzlePiecePath(sc, d, d._cw, d._ch);
                sc.fillStyle   = 'rgba(255,255,255,0.06)';
                sc.fill();
                drawPuzzlePiecePath(sc, d, d._cw, d._ch);
                sc.strokeStyle = 'rgba(255,255,255,0.3)';
                sc.lineWidth   = 1.5;
                sc.setLineDash([5,4]);
                sc.stroke();
                board.appendChild(slotCanvas);

                // ── 조각 캔버스 ──────────────────────────────────────────
                const canvas = document.createElement('canvas');
                canvas.width  = canW; canvas.height = canH;
                const ctx = canvas.getContext('2d');

                // 1) path 클리핑
                drawPuzzlePiecePath(ctx, d, d._cw, d._ch);
                ctx.save(); ctx.clip();

                // 2) 이미지 그리기
                // 캔버스 (0,0) = 보드의 (d.px - PUZZLE_PAD, d.py - PUZZLE_PAD) 위치
                // 따라서 drawImage 소스 좌표 = 이미지 픽셀 단위로 변환
                ctx.drawImage(
                    puzzleImg,
                    (d.px - PUZZLE_PAD) * scaleX,   // 소스 x
                    (d.py - PUZZLE_PAD) * scaleY,   // 소스 y
                    canW * scaleX,                  // 소스 너비
                    canH * scaleY,                  // 소스 높이
                    0, 0, canW, canH                // 대상 (전체 캔버스)
                );
                ctx.restore();

                // 3) 입체감 테두리
                drawPuzzlePiecePath(ctx, d, d._cw, d._ch);
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth   = 2;
                ctx.stroke();
                drawPuzzlePiecePath(ctx, d, d._cw, d._ch);
                ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                ctx.lineWidth   = 1;
                ctx.stroke();

                // 조각 wrapper div
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece in-tray';
                piece.dataset.pieceId = d.id;
                piece.dataset.placed  = 'false';
                piece.style.width  = canW + 'px';
                piece.style.height = canH + 'px';
                piece.appendChild(canvas);

                // 트레이 내부 폭(200px - padding 16px = 184px)에 맞춰 축소 비율 계산
                const TRAY_INNER = 184;
                const thumbScale = Math.min(1, TRAY_INNER / canW);
                piece.dataset.thumbScale = thumbScale;
                // CSS transform으로 축소 표시 + 실제 DOM 공간도 줄이기
                piece.style.transform       = `scale(${thumbScale})`;
                piece.style.transformOrigin = 'top left';
                // 축소된 실제 점유 크기를 margin-bottom 으로 보정
                const scaledH = canH * thumbScale;
                piece.style.marginBottom = (scaledH - canH) + 'px'; // 음수값으로 공간 줄임

                piece.addEventListener('mousedown', puzzleOnMouseDown);

                tray.appendChild(piece);
                puzzlePieces.push({ id: d.id, el: piece, def: d, placed: false });
            });

            const pieceEls = Array.from(tray.querySelectorAll('.puzzle-piece'));
            pieceEls.sort(() => Math.random() - 0.5);
            pieceEls.forEach(el => tray.appendChild(el));

            document.addEventListener('mousemove', puzzleOnMouseMove);
            document.addEventListener('mouseup',   puzzleOnMouseUp);
        }

        function puzzleOnMouseDown(e) {
            e.preventDefault();
            const el = e.currentTarget;
            if (el.dataset.placed === 'true') return;

            // 드래그 전 현재 화면 위치 (축소된 상태의 rect)
            const rect = el.getBoundingClientRect();

            // scale 제거 → 원본 크기로 복원
            el.style.transform       = 'none';
            el.style.transformOrigin = '';
            el.style.marginBottom    = '';

            el.classList.remove('in-tray');
            el.classList.add('dragging');

            // 원본 크기 복원 후 중심 맞춤 (클릭 위치 비율 유지)
            const canW = parseFloat(el.style.width);
            const canH = parseFloat(el.style.height);
            const thumbScale = parseFloat(el.dataset.thumbScale) || 1;

            // 클릭 위치 → 원본 기준 offset
            const clickRatioX = (e.clientX - rect.left) / rect.width;
            const clickRatioY = (e.clientY - rect.top)  / rect.height;
            const offsetX = clickRatioX * canW;
            const offsetY = clickRatioY * canH;

            el.style.position = 'fixed';
            el.style.zIndex   = '1000';
            el.style.margin   = '0';
            el.style.left     = (e.clientX - offsetX) + 'px';
            el.style.top      = (e.clientY - offsetY) + 'px';
            document.body.appendChild(el);

            const id  = parseInt(el.dataset.pieceId);
            const def = puzzlePieces.find(p => p.id === id).def;
            puzzleDragging = { el, id, def, offsetX, offsetY };
        }

        function puzzleOnMouseMove(e) {
            if (!puzzleDragging) return;
            const { el, offsetX, offsetY } = puzzleDragging;
            el.style.left = (e.clientX - offsetX) + 'px';
            el.style.top  = (e.clientY - offsetY) + 'px';
        }

        function puzzleOnMouseUp(e) {
            if (!puzzleDragging) return;
            const { el, id, def, offsetX, offsetY } = puzzleDragging;
            puzzleDragging = null;

            const board     = document.getElementById('puzzle-board');
            const boardRect = board.getBoundingClientRect();
            const tray      = document.getElementById('puzzle-tray');

            // 조각의 정답 좌상단이 보드 기준 어디에 떨어졌는지 계산
            // 조각 캔버스의 (0,0) = 보드의 (def.px - PAD, def.py - PAD)
            // e.clientX - offsetX = 조각 캔버스 좌상단의 viewport x
            // → 보드 기준 조각 캔버스 좌상단 x = (e.clientX-offsetX) - boardRect.left
            // → 이미지 원점(PAD 제거 후) = 위 값 + PUZZLE_PAD
            const dropPx = (e.clientX - offsetX - boardRect.left) + PUZZLE_PAD;
            const dropPy = (e.clientY - offsetY - boardRect.top)  + PUZZLE_PAD;

            const SNAP = Math.min(def.pw, def.ph) * 0.4;
            const dx = Math.abs(dropPx - def.px);
            const dy = Math.abs(dropPy - def.py);

            el.classList.remove('dragging');
            el.style.position=''; el.style.zIndex=''; el.style.left='';
            el.style.top=''; el.style.margin='';

            const inBoard = dropPx + def.pw > 0 && dropPx < BOARD_W &&
                            dropPy + def.ph > 0 && dropPy < BOARD_H;

            if (dx < SNAP && dy < SNAP) {
                // ✅ 정답 스냅 — 캔버스 좌상단 = (def.px - PAD, def.py - PAD)
                el.classList.add('placed'); el.classList.remove('in-tray');
                el.style.position = 'absolute';
                el.style.left     = (def.px - PUZZLE_PAD) + 'px';
                el.style.top      = (def.py - PUZZLE_PAD) + 'px';
                el.style.zIndex   = '5';
                el.dataset.placed = 'true';
                board.appendChild(el);

                const slot = board.querySelector(`.puzzle-slot[data-piece-id="${id}"]`);
                if (slot) slot.classList.add('matched');

                puzzlePlacedCount++;
                document.getElementById('puzzle-info').textContent =
                    '🧩 ' + puzzlePlacedCount + ' / ' + puzzleTotalPieces + ' 완성';
                showHitParticle(
                    boardRect.left + def.px + def.pw/2,
                    boardRect.top  + def.py + def.ph/2, '✨');

                if (puzzlePlacedCount >= puzzleTotalPieces) {
                    clearInterval(puzzleTimerInterval);
                    setTimeout(() => puzzleShowComplete(), 400);
                }
            } else if (inBoard) {
                // 보드 위 자유 이동 — scale 없는 원본 크기
                el.classList.remove('in-tray');
                el.style.transform       = 'none';
                el.style.transformOrigin = '';
                el.style.marginBottom    = '';
                el.style.position = 'absolute';
                el.style.left     = (e.clientX - offsetX - boardRect.left) + 'px';
                el.style.top      = (e.clientY - offsetY - boardRect.top)  + 'px';
                el.style.zIndex   = '10';
                board.appendChild(el);
            } else {
                // 트레이로 복귀 → 썸네일 scale 재적용
                el.classList.add('in-tray');
                el.style.position = '';
                el.style.left     = '';
                el.style.top      = '';
                el.style.zIndex   = '';
                const thumbScale = parseFloat(el.dataset.thumbScale) || 1;
                const canH = parseFloat(el.style.height);
                el.style.transform       = `scale(${thumbScale})`;
                el.style.transformOrigin = 'top left';
                el.style.marginBottom    = (canH * thumbScale - canH) + 'px';
                tray.appendChild(el);
            }
        }

        function puzzleShowComplete() {
            const board = document.getElementById('puzzle-board');
            // 슬롯 가이드 모두 숨기기 → 조각만 남아 원본 이미지처럼 보임
            board.querySelectorAll('.puzzle-slot').forEach(s => { s.style.opacity = '0'; });

            const ov = document.createElement('div');
            ov.className = 'puzzle-complete-overlay';
            ov.innerHTML = `<h3>🎉 완성!</h3>
                <p>⏰ ${puzzleSeconds}초 만에 맞췄어요!</p>
                <p style="margin-top:6px;font-size:1rem;color:#aef;">${puzzleSelectedName}</p>
                <p style="margin-top:10px;font-size:0.95rem;color:#ccc;">클릭하면 다른 이미지 선택</p>`;
            ov.addEventListener('click', () => endPuzzleGame());
            board.appendChild(ov);
            createConfetti();
        }

        function endPuzzleGame() {
            clearInterval(puzzleTimerInterval);
            document.removeEventListener('mousemove', puzzleOnMouseMove);
            document.removeEventListener('mouseup',   puzzleOnMouseUp);
            puzzleDragging = null;
            showPuzzleSelectScreen();
        }


        // 축하 효과
        function createConfetti() {
            const emojis = ['🎉', '🎊', '⭐', '🌟', '💖', '🎈', '🎀'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    conf.style.left = Math.random() * 100 + 'vw';
                    conf.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(conf);
                    setTimeout(() => conf.remove(), 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
